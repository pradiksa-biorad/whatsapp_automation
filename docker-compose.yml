services:
  app:
    build: .
    container_name: wa-survey
    ports:
      - "80:3001"
    volumes:
      # SQLite database — survives container restarts/updates
      - ./data:/app/data
      # WhatsApp auth sessions — avoids re-scanning QR after redeploy
      - ./auth_sessions:/app/auth_sessions
    environment:
      - NODE_ENV=production
      - PORT=3001
      # Override in a .env file on the EC2 instance
      - JWT_SECRET=${JWT_SECRET:-change-this-to-a-random-secret}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/sessions"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
